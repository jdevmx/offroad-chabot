# ─── Project configuration ───────────────────────────────────────────────────
# Single source of truth for the entire ai-specs template.
#
# How to use:
#   1. Fill in the project section and the sections matching your types
#   2. Run /setup-project to apply values across all spec files
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: "OffRoad Chabot"
  description: "AI Assistant for off-road enthusiasts that recognizes users, knows their 4x4 vehicles, and provides personalized advice"
  ticket_system: "local"

  # List all the types that describe your project (one or more):
  #   fullstack       — backend API + frontend UI
  #   backend-only    — API/service, no frontend
  #   frontend-only   — UI only, calls external APIs
  #   mcp-server      — Model Context Protocol server
  #   ai-agent        — Autonomous AI agent / multi-agent system
  #   infrastructure  — IaC for cloud resources (can combine with any other type)
  types:
    - fullstack
    - ai-agent

  # AI tools used in this project. claude is the default when list is empty.
  # Supported: claude, cursor, windsurf, copilot, gemini, kiro
  # Run ./ai-specs/init.sh after changing this list.
  copilots:
    - claude

  # ── Workflow automation ───────────────────────────────────────────────────
  # Control which steps are automated at the end of /develop-backend and
  # /develop-frontend. Disable to reduce AI token usage or to keep manual
  # control over commits and PRs.
  workflow:
    auto_commit: false   # Stage and commit changes after implementation
    auto_pr: false       # Push branch and open a PR after committing

# =============================================================================
# Backend — required when types includes: fullstack, backend-only
# =============================================================================
backend:
  runtime: "Node.js"
  language: "TypeScript"
  framework: "Express"
  orm: "none"
  database: "Firebase Firestore"
  test_framework: "Vitest"
  test_coverage: "80%"
  architecture: "Clean Architecture"
  src_path: "backend/src"

# =============================================================================
# Frontend — required when types includes: fullstack, frontend-only
# =============================================================================
frontend:
  framework: "Next.js"
  language: "TypeScript"
  build_tool: "Next.js"
  router: "Next.js App Router"
  ui_library: "Tailwind CSS"
  http_client: "fetch"
  state_management: "none"
  test_framework: "Vitest"
  src_path: "frontend/src"

# =============================================================================
# MCP Server — required when types includes: mcp-server
# =============================================================================
mcp:
  runtime: "{{MCP_RUNTIME}}"               # "Node.js", "Python", "Go"
  language: "{{MCP_LANGUAGE}}"             # "TypeScript", "Python", "Go"
  transport: "{{MCP_TRANSPORT}}"           # "stdio", "HTTP/SSE", "both"
  sdk: "{{MCP_SDK}}"                       # "@modelcontextprotocol/sdk", "mcp", "fastmcp"
  tools: "{{MCP_TOOLS}}"                   # comma-separated tools exposed, e.g., "search, read_file"
  resources: "{{MCP_RESOURCES}}"           # comma-separated resources, e.g., "file:///, db://"
  test_framework: "{{MCP_TEST_FRAMEWORK}}" # "Jest", "Vitest", "pytest"

# =============================================================================
# AI Agent — required when types includes: ai-agent
# =============================================================================
agent:
  framework: "LangChain.js"
  language: "TypeScript"
  model: "mistral-medium-latest"
  orchestration: "single-agent"
  memory: "Firebase Firestore"
  tools: "Tavily Search API, vehicle lookup"
  test_framework: "Vitest"

# =============================================================================
# QA — optional, add "qa" to types to enable the QA agent and standards
# =============================================================================
# qa:
#   test_framework: "{{QA_TEST_FRAMEWORK}}"   # "Playwright", "Cypress", "Jest", "Vitest", "pytest", "Go test"
#   coverage_threshold: "{{QA_COVERAGE_THRESHOLD}}" # "90%", "80%", "75%"
#   scope: "{{QA_SCOPE}}"                     # "all", "backend", "frontend", "e2e", "unit"
#   focus_areas: "{{QA_FOCUS_AREAS}}"         # e.g., "auth, payments, user-profile"
#   src_path: "{{QA_SRC_PATH}}"               # root path for coverage globs, e.g., "src", "backend/src"
#   test_command: "{{QA_TEST_COMMAND}}"        # e.g., "npm run test:coverage", "pytest --cov"
#
#   # ── Agent behavior ───────────────────────────────────────────────────────
#   # Controls how the qa-engineer agent acts during automated QA sessions.
#   agent_behavior:
#     auto_fix_bugs: false   # true  → agent fixes bugs it finds and re-runs tests
#                            # false → agent reports bugs only; never modifies source code
#     report_format: "markdown"  # "markdown" | "json" | "both"
#                                # markdown → .qa-report.md + inline chat summary
#                                # json     → .qa-report.json (CI-friendly)
#                                # both     → both files generated

